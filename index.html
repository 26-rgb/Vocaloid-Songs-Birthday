<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボカロ曲の誕生日</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>

    <header>
      <div class="header-inner">
        <h1 class="site-title">ボカロ曲の誕生日</h1>
        <div class="header-controls">
          <div id="negi-counter" class="negi-counter" aria-label="視聴済み曲数" style="display:none;">
            <img src="negi.png" alt="葱" class="negi-counter-img">
            <span class="negi-counter-x">×</span>
            <span id="negi-count" class="negi-counter-num">0</span>
          </div>
          <div class="date-selects">
            <select name="month" id="selectMonth" aria-label="月を選択">
              <option value="">月</option>
              <option value="1">1月</option>
              <option value="2">2月</option>
              <option value="3">3月</option>
              <option value="4">4月</option>
              <option value="5">5月</option>
              <option value="6">6月</option>
              <option value="7">7月</option>
              <option value="8">8月</option>
              <option value="9">9月</option>
              <option value="10">10月</option>
              <option value="11">11月</option>
              <option value="12">12月</option>
            </select>
            <select name="day" id="selectDay" aria-label="日を選択">
              <option value="">日</option>
              <option value="1">1日</option>
              <option value="2">2日</option>
              <option value="3">3日</option>
              <option value="4">4日</option>
              <option value="5">5日</option>
              <option value="6">6日</option>
              <option value="7">7日</option>
              <option value="8">8日</option>
              <option value="9">9日</option>
              <option value="10">10日</option>
              <option value="11">11日</option>
              <option value="12">12日</option>
              <option value="13">13日</option>
              <option value="14">14日</option>
              <option value="15">15日</option>
              <option value="16">16日</option>
              <option value="17">17日</option>
              <option value="18">18日</option>
              <option value="19">19日</option>
              <option value="20">20日</option>
              <option value="21">21日</option>
              <option value="22">22日</option>
              <option value="23">23日</option>
              <option value="24">24日</option>
              <option value="25">25日</option>
              <option value="26">26日</option>
              <option value="27">27日</option>
              <option value="28">28日</option>
              <option value="29">29日</option>
              <option value="30">30日</option>
              <option value="31">31日</option>
            </select>
          </div>
          <div class="hamburger" id="hamburger" aria-label="メニュー" role="button" tabindex="0">
            <span></span><span></span><span></span>
          </div>
        </div>
        <nav class="nav" id="nav">
          <ul>
            <li><a href="https://tsukinami-likes-vocaloid.github.io/P-has-over-10K-subscribers/">登録者1万人超えボカロP一覧</a></li>
            <li><a href="https://jbbs.shitaraba.net/music/29264/">ぼからんまとめ避難所</a></li>
            <li><a href="https://vocaloid-collection.jp/">ボカコレ</a></li>
            <li><a href="https://cafe.kiite.jp/intro" target="_blank" rel="noopener">kiite cafe</a></li>
            <li><a href="https://blog.piapro.net/" target="_blank" rel="noopener">MIKU BLOG</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <div id="date-heading" class="date-heading"></div>
      <div id="loading" class="loading" style="display:none;">
        <div class="loading-spinner"></div>
        <p>読み込み中…</p>
      </div>
      <div id="no-results" class="no-results" style="display:none;">
        <p>この日に生まれた曲はまだ登録されていません。</p>
      </div>
      <div id="song-list" class="song-list"></div>
    </main>

    <!-- p5.jsは不要。sketch.jsはバニラJSで動作 -->
    <script src="sketch.js"></script>
  </body>
</html>
